<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NewTone</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script>
			// FOUC 防闪 · 同步 inline:CSS paint 前把 data-theme 写到 <html>
			(function () {
				try {
					var raw = localStorage.getItem("newtone:entry")
					if (!raw) return
					var theme = JSON.parse(raw)?.preferences?.theme
					if (theme === "dark" || theme === "sepia" || theme === "light") {
						document.documentElement.setAttribute("data-theme", theme)
					}
				} catch (e) {}
			})()
		</script>
		<style>
			/* FOUC 兜底 · tokens.css 加载前先按主题铺底色
			 * 值必须跟 tokens.css 完全一致,否则加载完会跳变 */
			html, body { background: #f8f6f0; color: #171512; }
			html[data-theme="dark"], html[data-theme="dark"] body { background: #090b0d; color: #edf4f1; }
			html[data-theme="sepia"], html[data-theme="sepia"] body { background: #f1e6d0; color: #382c1d; }
		</style>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+SC:wght@300;400&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
