<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NewTone</title>
		<script>
			// FOUC 防闪：CSS paint 前把 data-theme 写到 <html>
			// 必须用同步 inline script（不能用 module / defer）
			(function () {
				try {
					var raw = localStorage.getItem("newtone:entry")
					if (!raw) return
					var theme = JSON.parse(raw)?.preferences?.theme
					if (theme === "dark" || theme === "sepia" || theme === "light") {
						document.documentElement.setAttribute("data-theme", theme)
					}
				} catch (e) {}
			})()
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+SC:wght@300;400&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
